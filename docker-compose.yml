services:
  app:
    build:
      context: .
      target: prod
    command: ["sh", "-c", "npm run db:migrate && node app.js --no-dotenv"]
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"
      ADMIN_API_KEY: "your_secret_key"
      JWT_SECRET: "change_me"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_USER: "student"
      MYSQL_PASSWORD: "student_password"
      MYSQL_DB: "student_db"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "student_db"
      MYSQL_USER: "student"
      MYSQL_PASSWORD: "student_password"
      MYSQL_ROOT_PASSWORD: "root_password"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
  redis_data:
